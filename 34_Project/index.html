<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Multi Digital Timer</title>

		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Orbitron:wght@700;900&display=swap"
			rel="stylesheet"
		/>

		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				background: #020202;
				color: #ffffff;
				font-family: "Poppins", sans-serif;
				height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				overflow: hidden;
			}

			.timer-section {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 16px;
				margin-bottom: 40px;
				transform: scale(0.92);
			}

			.header-text h1 {
				font-size: 1.2rem;
				letter-spacing: 5px;
				margin-bottom: 4px;
				color: rgba(255, 255, 255, 0.5);
				text-transform: uppercase;
				text-align: center;
			}

			.header-text .year {
				color: #00d2ff;
				font-weight: 700;
				text-shadow: 0 0 12px rgba(0, 210, 255, 0.6);
			}

			.countdown {
				display: flex;
				gap: 12px;
				align-items: center;
				justify-content: center;
				flex-wrap: wrap;
			}

			.time-box {
				background: rgba(0, 210, 255, 0.05);
				border: 1px solid rgba(0, 210, 255, 0.2);
				padding: 18px 22px;
				border-radius: 16px;
				display: flex;
				flex-direction: column;
				align-items: center;
				min-width: 150px;
				backdrop-filter: blur(6px);
			}

			.number {
				font-family: "Orbitron", monospace;
				font-weight: 900;
				font-size: clamp(48px, 8vw, 110px);
				color: #00d2ff;
				line-height: 1;
				text-shadow: 0 0 16px rgba(0, 210, 255, 0.5);

				display: inline-flex;
				justify-content: center;
				align-items: center;

				width: 2.6ch;
				font-variant-numeric: tabular-nums;
			}

			.days {
				width: 4.2ch;
			}

			.label {
				margin-top: 10px;
				font-size: 0.75rem;
				letter-spacing: 3px;
				color: rgba(0, 210, 255, 0.7);
				text-transform: uppercase;
				font-weight: 600;
			}

			.separator {
				font-family: "Orbitron", sans-serif;
				font-size: 2.4rem;
				color: rgba(0, 210, 255, 0.3);
				animation: blink 1.5s infinite;
			}

			@keyframes blink {
				50% {
					opacity: 0;
				}
			}

			@media (max-width: 700px) {
				.separator {
					display: none;
				}
			}
		</style>
	</head>

	<body>
		<!-- TIMER 1 -->
		<div class="timer-section">
			<div class="header-text">
				<h1>Time Remaining For <span class="year">2027</span></h1>
			</div>

			<div class="countdown" data-target="2027-01-01T00:00:00">
				<div class="time-box">
					<span class="number days">000</span>
					<span class="label">Days</span>
				</div>

				<div class="separator">:</div>

				<div class="time-box">
					<span class="number hours">00</span>
					<span class="label">Hours</span>
				</div>

				<div class="separator">:</div>

				<div class="time-box">
					<span class="number minutes">00</span>
					<span class="label">Minutes</span>
				</div>

				<div class="separator">:</div>

				<div class="time-box">
					<span class="number seconds">00</span>
					<span class="label">Seconds</span>
				</div>
			</div>
		</div>

		<!-- TIMER 2 -->
		<div class="timer-section">
			<div class="header-text">
				<h1>Time Remaining For <span class="year">Project Deadline</span></h1>
			</div>

			<div class="countdown" data-target="2026-04-01T00:00:00">
				<div class="time-box">
					<span class="number days">000</span>
					<span class="label">Days</span>
				</div>

				<div class="separator">:</div>

				<div class="time-box">
					<span class="number hours">00</span>
					<span class="label">Hours</span>
				</div>

				<div class="separator">:</div>

				<div class="time-box">
					<span class="number minutes">00</span>
					<span class="label">Minutes</span>
				</div>

				<div class="separator">:</div>

				<div class="time-box">
					<span class="number seconds">00</span>
					<span class="label">Seconds</span>
				</div>
			</div>
		</div>

		<script>
			function startTimer(container) {
				const target = new Date(container.dataset.target).getTime();

				const els = {
					days: container.querySelector(".days"),
					hours: container.querySelector(".hours"),
					minutes: container.querySelector(".minutes"),
					seconds: container.querySelector(".seconds"),
				};

				function update() {
					let diff = target - Date.now();

					if (diff <= 0) {
						els.days.textContent = "000";
						els.hours.textContent =
							els.minutes.textContent =
							els.seconds.textContent =
								"00";
						return;
					}

					const d = Math.floor(diff / 86400000);
					diff %= 86400000;
					const h = Math.floor(diff / 3600000);
					diff %= 3600000;
					const m = Math.floor(diff / 60000);
					const s = Math.floor((diff % 60000) / 1000);

					els.days.textContent = String(d).padStart(3, "0");
					els.hours.textContent = String(h).padStart(2, "0");
					els.minutes.textContent = String(m).padStart(2, "0");
					els.seconds.textContent = String(s).padStart(2, "0");
				}

				update();
				setInterval(update, 1000);
			}

			document.querySelectorAll(".countdown").forEach(startTimer);
		</script>
	</body>
</html>
